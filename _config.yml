# Site settings
title: "Prakhosha"
description: "Angga Bayu Prakhosha's resume"

# Build settings
markdown: kramdown
sass:
  sass_dir: _sass
  style: compressed

# Resume settings
resume_avatar:                  "false"
resume_name:                    "Human is a System of Values"
resume_title:                   "Angga Bayu Prakhosha"

# used for the contact button in _layouts/resume.html
resume_contact_email:           "anggaprakhosha@gmail.com"

# the next two items are used for schema itemprops in _layouts/resume.html
# resume_contact_telephone:       "555-7334"
# resume_contact_address:         "742 Evergreen Terrace, Springfield"

resume_header_contact_info:     "anggaprakhosha@gmail.com"
display_header_contact_info:    "true"

resume_header_intro: "<p> A generalist who's interested in complex system science from philosophy to practicality. I am a deep thinker, an independent learner, and a holistic problem solver. I believe interactions between systems can produce various emergent behaviors, one of which is meaning. Hence, a meaningfulness based paradigm as opposed to nihilism based paradigm will offer various possibilities for us, humans. And thus, I would love to contribute myself to the development of complex system science and education.</p>"

# use "yes" to display the email contact button,
# "no" to display an "I'm not looking for work" message,
# or remove the resume_looking_for_work option entirely
# to leave blank
resume_looking_for_work:        "yes"

# Decide which sections to use
# comment out to hide
resume_section_experience:      true
resume_section_education:       true
resume_section_projects:        true
resume_section_skills:          false
resume_section_recognition:     true
resume_section_links:           false
resume_section_associations:    false
# resume_section_interests:       true

# Resume social links
# uncomment the options you wish to display, and add your own URL
resume_social_links:
  resume_github_url:            "https://github.com/prakhosha"
  # resume_twitter_url:           "http://twitter.com/jglovier"
  # resume_dribbble_url:          "https://dribbble.com/jag"
  # resume_facebook_url:          "insert Facebook URL here"
  resume_linkedin_url:          "https://www.linkedin.com/in/angga-prakhosha/"
  # resume_instagram_url:         "insert your Instagram URL here"
  resume_website_url:           "https://prakhosha.wordpress.com/"
  #resume_medium_url:            "https://medium.com/@jglovier"
resume_print_social_links:      true

# Design settings
resume_theme:                   default

